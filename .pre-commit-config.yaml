# Hooks run before each commit. Install once with `pre-commit install`.
# https://pre-commit.com

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        # 2 MB ceiling: catches accidental binaries (build artifacts,
        # full-resolution screen captures) while letting deliberate
        # README demo assets like `screenshots/quadrics.mp4` through.
        # Raised from 500 KB when the v0.1.1 demo video landed (#41).
        args: ['--maxkb=2000']
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint --silent
        language: system
        types: [ts]
        pass_filenames: false
